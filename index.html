<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Karat — Buchhaltung</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f2f7; --surface:#ffffff; --surface2:#f2f2f7;
  --divide:rgba(60,60,67,.12); --divide-strong:rgba(60,60,67,.2);
  --text:#1c1c1e; --text-secondary:#6e6e73; --text-tertiary:#aeaeb2;
  --blue:#007aff; --blue-bg:rgba(0,122,255,.09);
  --green:#2f9e52; --green-bg:rgba(47,158,82,.1);
  --red:#ff3b30; --red-bg:rgba(255,59,48,.08);
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px;
  --ease:cubic-bezier(.4,0,.2,1);
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --field-h:40px;
}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh;}
.mono{font-family:'DM Mono',monospace;}
.page{max-width:1060px; margin:0 auto; padding:28px 20px 72px;}

header.top{display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:22px; flex-wrap:wrap;}
.wordmark{display:flex; align-items:center; gap:12px;}
.wordmark-icon{width:34px; height:34px; background:var(--blue); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.wordmark-icon svg{width:18px; height:18px;}
h1{font-size:19px; font-weight:700; margin:0; letter-spacing:-.02em;}
.kicker{font-size:12px; font-weight:600; color:var(--blue); text-transform:uppercase; letter-spacing:.06em; margin-top:1px;}
.account-pill{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--text-secondary); background:var(--surface); border-radius:999px; padding:6px 6px 6px 12px; box-shadow:var(--shadow);}
.account-pill img{width:22px; height:22px; border-radius:50%;}

nav.tabs{display:flex; gap:4px; background:var(--surface2); border-radius:999px; padding:4px; margin-bottom:20px; flex-wrap:wrap; width:fit-content; max-width:100%;}
nav.tabs button{font-family:'DM Sans',sans-serif; font-weight:500; font-size:13px; background:transparent; border:none;
  padding:9px 17px; cursor:pointer; border-radius:999px; color:var(--text-secondary); transition:all .15s var(--ease); white-space:nowrap;}
nav.tabs button:hover{color:var(--text);}
nav.tabs button.active{background:var(--blue); color:#fff; font-weight:600; box-shadow:0 2px 6px rgba(0,122,255,.35);}

.card{background:var(--surface); border-radius:var(--r-xl); box-shadow:var(--shadow); padding:24px; margin-bottom:18px;}
.card h2{font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-secondary); margin:0 0 16px;}
.card h3{font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-secondary); margin:22px 0 10px;}

.grid{display:grid; gap:16px;}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:720px){.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}

.kpi{background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:18px 20px;}
.kpi .label{font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-secondary);}
.kpi .value{font-family:'DM Sans',sans-serif; font-variant-numeric:tabular-nums; font-size:23px; font-weight:600; margin-top:6px; color:var(--text);}
.kpi .value.pos{color:var(--green);} .kpi .value.neg{color:var(--red);}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-secondary); border-bottom:1px solid var(--divide-strong); padding:9px 10px;}
td{padding:11px 10px; border-bottom:1px solid var(--divide); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.total td{font-weight:600; border-top:1px solid var(--divide-strong); border-bottom:none;}
.num{font-family:'DM Sans',sans-serif; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap;}
.num.pos{color:var(--green);} .num.neg{color:var(--red);}

.badge{display:inline-flex; align-items:center; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:500;}
.badge.settled{background:var(--green-bg); color:var(--green);}
.badge.person{background:var(--blue-bg); color:var(--blue);}

.row-form{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-top:14px;}
.field{display:flex; flex-direction:column; gap:6px;}
.field label{font-size:11.5px; font-weight:500; color:var(--text-secondary);}
input,select{
  height:var(--field-h); box-sizing:border-box;
  font-family:'DM Sans',sans-serif; font-size:13.5px; padding:0 12px;
  border:1px solid var(--divide-strong); border-radius:var(--r-md);
  background:var(--surface2); color:var(--text); outline:none;
  transition:border-color .15s, box-shadow .15s, background .15s;
}
select{
  appearance:none; -webkit-appearance:none;
  background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none' stroke='%236e6e73' stroke-width='1.6'%3E%3Cpath d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 10px center; background-size:14px; padding-right:32px;
}
input:focus, select:focus{border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-bg); background:#fff;}
input.num-in{font-family:'DM Sans',sans-serif; font-variant-numeric:tabular-nums; text-align:right;}
input[type=text].wide{min-width:200px;}
input[type=number]{width:120px;}
input[type=date]{width:155px;}

button.btn{
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:13px; height:var(--field-h);
  background:var(--blue); color:#fff; border:none; border-radius:var(--r-md); padding:0 18px; cursor:pointer;
  transition:opacity .15s;
}
button.btn:hover{opacity:.88;}
button.btn.ghost{background:var(--surface2); color:var(--text);}
button.btn.danger{background:var(--red); color:#fff; height:var(--field-h); padding:0 18px; font-size:13px; font-weight:600;}
button.btn.danger.small{background:transparent; color:var(--red); height:auto; padding:6px 12px; font-size:12px;}
button.btn.small{height:auto; padding:6px 12px; font-size:12px;}
button.btn:disabled{opacity:.5; cursor:wait;}

.proj-list{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
.proj-chip{border:1px solid var(--divide-strong); border-radius:999px; padding:8px 16px; cursor:pointer; background:var(--surface);
  font-size:13px; font-weight:500; transition:all .15s var(--ease);}
.proj-chip.active{background:var(--blue); color:#fff; border-color:var(--blue);}

.hint{font-size:12px; color:var(--text-tertiary); margin-top:10px; line-height:1.6;}
.checkbox-cell{text-align:center;}
input[type=checkbox]{height:auto; width:16px; accent-color:var(--blue); cursor:pointer;}
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff;
  padding:10px 18px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s; box-shadow:var(--shadow);}
.toast.show{opacity:1;}
.empty{color:var(--text-tertiary); font-size:13px; padding:16px 0; font-style:italic;}
.member-edit{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.loading{padding:60px 0; text-align:center; color:var(--text-tertiary); font-size:14px;}

.setup-card{max-width:480px; margin:60px auto; background:var(--surface); border-radius:var(--r-xl); box-shadow:var(--shadow); padding:28px;}
.setup-card h2{margin:0 0 6px; font-size:17px; font-weight:700; text-transform:none; letter-spacing:0; color:var(--text);}
.setup-card p{font-size:13px; color:var(--text-secondary); line-height:1.6; margin:0 0 18px;}
.setup-card .field{margin-bottom:14px;}
.setup-card input{width:100%;}
.gsi-btn{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; height:44px; background:#fff; border:1px solid var(--divide-strong); border-radius:var(--r-md); cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:500; font-size:14px; color:var(--text);}
.gsi-btn:hover{background:var(--surface2);}
</style>
</head>
<body>
<div class="page" id="page">
  <div class="loading">Lade…</div>
</div>
<div class="toast" id="toast"></div>
<div id="busy-overlay" style="display:none; position:fixed; inset:0; background:rgba(242,242,247,.65); backdrop-filter:blur(2px); z-index:1000; align-items:center; justify-content:center; flex-direction:column; gap:12px;">
  <div style="width:28px; height:28px; border:3px solid var(--divide-strong); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite;"></div>
  <div style="font-size:13px; color:var(--text-secondary); font-weight:500;" id="busy-label">Speichert…</div>
</div>
<div id="hang-banner" style="display:none; position:fixed; top:0; left:0; right:0; z-index:1001; background:var(--red); color:#fff; padding:12px 20px; align-items:center; justify-content:center; gap:14px; font-size:13.5px; font-weight:500;">
  <span>Die Verbindung zu Google Sheets hängt gerade. Bitte neu laden.</span>
  <button class="btn" style="background:#fff; color:var(--red); height:30px; padding:0 14px;" onclick="location.reload()">Neu laden</button>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<script>
// ============ KONFIGURATION (wird einmalig lokal gespeichert) ============
let CONFIG = JSON.parse(localStorage.getItem('karat_config') || 'null');

// ============ Sheet-Struktur ============
const SHEET_DEFS = {
  Projekte:     ['id','name','kuerzel','traeger','budget','einnahmenBar','einnahmenShop'],
  Buchungen:    ['id','projektId','datum','ausgabe','preis','kategorie','bezahltVon','zahlweg','belegnr','erstattet','erstattetVia','belegUrl'],
  Vereinskonto: ['id','datum','kategorie','beschreibung','betrag','typ','konto','quelleBuchungId','belegnr','belegUrl'],
  Konten:       ['konto','anfang','tatsaechlich'],
  Mitglieder:   ['name'],
};
const ACCOUNTS = ["Vereinskonto","PayPal","Barkasse"];
const ACCOUNT_LABELS = { Vereinskonto:"Bankkonto", PayPal:"PayPal", Barkasse:"Barkasse" };
const KATEGORIEN = ["Verbrauch","Kauf","Leihe","Anschaffung","Geschenk"];
function accLabel(a){ return ACCOUNT_LABELS[a] || a; }
const DEFAULT_MEMBERS = ["Julia","Gervas","Basti","Mitglied 4","Mitglied 5","Mitglied 6","Mitglied 7","Mitglied 8","Mitglied 9","Mitglied 10"];

// ============ Auth ============
let accessToken = null;
let tokenClient = null;
let userInfo = null;

function initGis(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.clientId,
    scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
    callback: async (resp) => {
      if(resp.error){ showToast('Anmeldung fehlgeschlagen: '+resp.error); return; }
      accessToken = resp.access_token;
      try { userInfo = await apiFetch('https://www.googleapis.com/oauth2/v2/userinfo'); } catch(e){ userInfo = null; }
      await boot();
    },
  });
}
function signIn(promptConsent){
  tokenClient.requestAccessToken({ prompt: promptConsent ? 'consent' : '' });
}
function signOut(){
  if(accessToken) google.accounts.oauth2.revoke(accessToken, ()=>{});
  accessToken = null; userInfo = null;
  renderSetupOrSignIn();
}

// ============ Low-level Sheets API ============
const API_BASE = 'https://sheets.googleapis.com/v4/spreadsheets';
let sheetIdCache = {};

async function apiFetch(url, method, body){
  const res = await fetch(url, {
    method: method || 'GET',
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if(res.status === 401){
    await new Promise(resolve=>{
      tokenClient.callback = async (resp)=>{ accessToken = resp.access_token; resolve(); };
      tokenClient.requestAccessToken({ prompt:'' });
    });
    return apiFetch(url, method, body);
  }
  const json = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error((json.error && json.error.message) || ('Sheets API Fehler ('+res.status+')'));
  return json;
}

function colLetter(n){ let s=''; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26); } return s; }
function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2)).slice(0,12); }

async function getSheetMeta(){
  const meta = await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}?fields=sheets.properties`);
  sheetIdCache = {};
  meta.sheets.forEach(s=>{ sheetIdCache[s.properties.title] = s.properties.sheetId; });
  return meta.sheets.map(s=>s.properties.title);
}

async function ensureSheets(){
  const existing = await getSheetMeta();
  const requests = [];
  const toInit = [];
  for(const name of Object.keys(SHEET_DEFS)){
    if(!existing.includes(name)){ requests.push({ addSheet: { properties: { title: name } } }); toInit.push(name); }
  }
  if(requests.length){
    await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}:batchUpdate`, 'POST', { requests });
    await getSheetMeta();
  }
  for(const name of toInit){
    const headers = SHEET_DEFS[name];
    await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!A1')}?valueInputOption=RAW`, 'PUT', { values:[headers] });
    if(name === 'Konten'){
      await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent('Konten!A2')}?valueInputOption=RAW`, 'PUT',
        { values: ACCOUNTS.map(a=>[a,0,0]) });
    }
    if(name === 'Mitglieder'){
      await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent('Mitglieder!A2')}?valueInputOption=RAW`, 'PUT',
        { values: DEFAULT_MEMBERS.map(m=>[m]) });
    }
  }
  // Migration: bei bereits bestehenden Sheets fehlende Spalten hinten anhängen,
  // ohne vorhandene Daten anzufassen.
  for(const name of Object.keys(SHEET_DEFS)){
    if(toInit.includes(name)) continue;
    const headerJson = await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!1:1')}`);
    const currentHeaders = (headerJson.values && headerJson.values[0]) || [];
    const missing = SHEET_DEFS[name].filter(h => currentHeaders.indexOf(h) === -1);
    if(missing.length){
      const startCol = colLetter(currentHeaders.length + 1);
      await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!'+startCol+'1')}?valueInputOption=RAW`, 'PUT', { values:[missing] });
    }
  }
}

async function readSheet(name){
  const headers = SHEET_DEFS[name];
  const range = `${name}!A2:${colLetter(headers.length)}`;
  const json = await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(range)}`);
  const rows = json.values || [];
  return rows.map((r,i)=>{
    const o = { __row: i+2 };
    headers.forEach((h,idx)=>{ o[h] = r[idx] !== undefined ? r[idx] : ''; });
    return o;
  }).filter(o => headers.some(h => o[h] !== '' && o[h] !== undefined));
}

async function appendRow(name, obj){
  const headers = SHEET_DEFS[name];
  const row = headers.map(h => obj[h] !== undefined ? obj[h] : '');
  await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!A:A')}:append?valueInputOption=USER_ENTERED`, 'POST', { values:[row] });
}

async function updateRow(name, rowNumber, obj){
  const headers = SHEET_DEFS[name];
  const row = headers.map(h => obj[h] !== undefined ? obj[h] : '');
  const range = `${name}!A${rowNumber}:${colLetter(headers.length)}${rowNumber}`;
  await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, 'PUT', { values:[row] });
}

async function deleteRows(name, rowNumbers){
  if(!rowNumbers.length) return;
  const sheetId = sheetIdCache[name];
  const uniqueDesc = [...new Set(rowNumbers)].sort((a,b)=>b-a);
  const requests = uniqueDesc.map(r => ({
    deleteDimension: { range: { sheetId, dimension:'ROWS', startIndex:r-1, endIndex:r } }
  }));
  await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}:batchUpdate`, 'POST', { requests });
}

async function clearAndWrite(name, rowsOfValues){
  const headers = SHEET_DEFS[name];
  await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!A2:'+colLetter(headers.length)+'2000')}:clear`, 'POST', {});
  if(rowsOfValues.length){
    await apiFetch(`${API_BASE}/${CONFIG.spreadsheetId}/values/${encodeURIComponent(name+'!A2')}?valueInputOption=USER_ENTERED`, 'PUT', { values: rowsOfValues });
  }
}

// ============ Google Drive: Belege ablegen ============
const DRIVE_FILES_API = 'https://www.googleapis.com/drive/v3/files';
const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3/files';
let folderCache = {};

async function findOrCreateFolder(name, parentId){
  const cacheKey = parentId + '/' + name;
  if(folderCache[cacheKey]) return folderCache[cacheKey];
  const safeName = name.replace(/'/g, "\\'");
  const q = encodeURIComponent(`'${parentId}' in parents and name='${safeName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const list = await apiFetch(`${DRIVE_FILES_API}?q=${q}&fields=files(id,name)`);
  if(list.files && list.files.length){ folderCache[cacheKey] = list.files[0].id; return list.files[0].id; }
  const created = await apiFetch(DRIVE_FILES_API, 'POST', { name, mimeType:'application/vnd.google-apps.folder', parents:[parentId] });
  folderCache[cacheKey] = created.id;
  return created.id;
}

async function resolveBelegFolder(typ, datumStr){
  const year = (datumStr || '').slice(0,4) || String(new Date().getFullYear());
  const alleRechnungen = await findOrCreateFolder('Alle Rechnungen', CONFIG.financeFolderId);
  const yearFolder = await findOrCreateFolder(year, alleRechnungen);
  const subName = typ === 'Einnahme' ? 'Einnahmen' : 'Ausgaben';
  return await findOrCreateFolder(subName, yearFolder);
}

function sanitizeFilenamePart(s){
  return (s || '').toString().normalize('NFKD').replace(/[^\w\- ]/g,'').trim().replace(/\s+/g,'_').slice(0,40) || 'Beleg';
}

function arrayBufferToBase64(buffer){
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const chunkSize = 0x8000;
  for(let i=0; i<bytes.length; i+=chunkSize){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunkSize));
  }
  return btoa(binary);
}

async function uploadBeleg(file, folderId, filename){
  const metadata = { name: filename, parents:[folderId] };
  const boundary = '-------karat' + uid();
  const delim = `\r\n--${boundary}\r\n`;
  const closeDelim = `\r\n--${boundary}--`;
  const base64Data = arrayBufferToBase64(await file.arrayBuffer());
  const body =
    delim + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) +
    delim + `Content-Type: ${file.type || 'application/octet-stream'}\r\nContent-Transfer-Encoding: base64\r\n\r\n` + base64Data +
    closeDelim;
  const res = await fetch(`${DRIVE_UPLOAD_API}?uploadType=multipart&fields=id,webViewLink`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
    body,
  });
  const json = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error((json.error && json.error.message) || 'Drive-Upload fehlgeschlagen');
  return json;
}

function nextBelegnummer(){
  const nums = [];
  Object.values(state.projectsById).forEach(p => (p.entries||[]).forEach(e=>{ const n=parseInt(e.belegnr,10); if(!isNaN(n)) nums.push(n); }));
  state.vereinskonto.forEach(e=>{ const n=parseInt(e.belegnr,10); if(!isNaN(n)) nums.push(n); });
  const max = nums.length ? Math.max(...nums) : 0;
  return String(max+1).padStart(4,'0');
}

function extractDriveFileId(url){
  if(!url) return null;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}
async function trashDriveFile(url){
  const id = extractDriveFileId(url);
  if(!id) return;
  try { await apiFetch(`${DRIVE_FILES_API}/${id}`, 'PATCH', { trashed:true }); }
  catch(e){ console.error('Beleg konnte nicht in den Papierkorb verschoben werden', e); }
}

// ============ App-State & Business-Logik ============
let state = { projectsById:{}, vereinskonto:[], kontoRows:[], members:[] };
let activeTab = 'dashboard';
let activeProjectId = null;
let editingEntryId = null;

function eur(n){ n=+n||0; return n.toLocaleString('de-DE',{style:'currency',currency:'EUR'}); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
function esc(s){ return (s??'').toString().replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }
function truthy(v){ return v===true || v==='true' || v===1 || v==='TRUE'; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h=setTimeout(()=>t.classList.remove('show'),1800);
}
let busyCount = 0;
function setBusy(isBusy, label){
  busyCount += isBusy ? 1 : -1;
  if(busyCount < 0) busyCount = 0;
  const overlay = document.getElementById('busy-overlay');
  if(label) document.getElementById('busy-label').textContent = label;
  if(overlay) overlay.style.display = busyCount > 0 ? 'flex' : 'none';
}
async function withBusy(label, fn){
  setBusy(true, label);
  const timeoutId = setTimeout(()=>{ setBusy(false); document.getElementById('hang-banner').style.display='flex'; }, 20000);
  try { const r = await fn(); clearTimeout(timeoutId); setBusy(false); return r; }
  catch(err){ clearTimeout(timeoutId); setBusy(false); console.error(err); showToast('Fehler: '+(err.message||err)); throw err; }
}

async function refresh(){
  const [projekteRaw, buchungenRaw, vkRaw, kontenRaw, mitgliederRaw] = await Promise.all([
    readSheet('Projekte'), readSheet('Buchungen'), readSheet('Vereinskonto'), readSheet('Konten'), readSheet('Mitglieder'),
  ]);
  state.projectsById = {};
  projekteRaw.forEach(p=>{ p.entries = buchungenRaw.filter(b=>String(b.projektId)===String(p.id)); state.projectsById[p.id]=p; });
  state.vereinskonto = vkRaw;
  state.kontoRows = kontenRaw;
  state.members = mitgliederRaw.map(m=>m.name);
  const ids = Object.keys(state.projectsById);
  if(ids.length && !state.projectsById[activeProjectId]) activeProjectId = ids[0];
}
function kontoRow(a){ return state.kontoRows.find(k=>k.konto===a) || {anfang:0, tatsaechlich:0, __row:null}; }

// ---------- Ableitungen ----------
function pEinnahmen(p){ return num(p.einnahmenBar)+num(p.einnahmenShop); }
function pAusgaben(p){ return (p.entries||[]).reduce((s,e)=>s+num(e.preis),0); }
function pDifferenz(p){ return pEinnahmen(p)-pAusgaben(p); }
function pByKonto(p, konto){ return (p.entries||[]).filter(e=>e.bezahltVon==='ausgeglichen' && e.zahlweg===konto).reduce((s,e)=>s+num(e.preis),0); }
function pByPerson(p, member){ return (p.entries||[]).filter(e=>e.bezahltVon===member).reduce((s,e)=>s+num(e.preis),0); }
function pByPersonOffen(p, member){ return (p.entries||[]).filter(e=>e.bezahltVon===member && !truthy(e.erstattet)).reduce((s,e)=>s+num(e.preis),0); }

function vkFiltered(konto){ return state.vereinskonto.filter(e => (e.konto || 'Vereinskonto') === konto); }
function vkEinnahmenKonto(konto){ return vkFiltered(konto).filter(e=>e.typ==='Einnahme').reduce((s,e)=>s+num(e.betrag),0); }
function vkAusgabenKonto(konto){ return vkFiltered(konto).filter(e=>e.typ==='Ausgabe').reduce((s,e)=>s+num(e.betrag),0); }
function vkEinnahmenAll(){ return state.vereinskonto.filter(e=>e.typ==='Einnahme').reduce((s,e)=>s+num(e.betrag),0); }
function vkAusgabenAll(){ return state.vereinskonto.filter(e=>e.typ==='Ausgabe').reduce((s,e)=>s+num(e.betrag),0); }

function kontoStand(konto){
  const settings = kontoRow(konto);
  const projects = Object.values(state.projectsById);
  let zugang=0, abgang=0;
  if(konto==='Barkasse'){ zugang = projects.reduce((s,p)=>s+num(p.einnahmenBar),0) + vkEinnahmenKonto('Barkasse'); abgang = projects.reduce((s,p)=>s+pByKonto(p,'Barkasse'),0) + vkAusgabenKonto('Barkasse'); }
  else if(konto==='PayPal'){ zugang = projects.reduce((s,p)=>s+num(p.einnahmenShop),0) + vkEinnahmenKonto('PayPal'); abgang = projects.reduce((s,p)=>s+pByKonto(p,'PayPal'),0) + vkAusgabenKonto('PayPal'); }
  else if(konto==='Vereinskonto'){ zugang = vkEinnahmenKonto('Vereinskonto'); abgang = vkAusgabenKonto('Vereinskonto') + projects.reduce((s,p)=>s+pByKonto(p,'Vereinskonto'),0); }
  const endbestand = num(settings.anfang)+zugang-abgang;
  return {anfang:num(settings.anfang), zugang, abgang, endbestand, tatsaechlich:num(settings.tatsaechlich)};
}

function memberTotals(member){
  const projects = Object.values(state.projectsById);
  const gesamt = projects.reduce((s,p)=>s+pByPerson(p,member),0);
  const offen = projects.reduce((s,p)=>s+pByPersonOffen(p,member),0);
  return {gesamt, offen, erstattet: gesamt-offen};
}

  {id:'projekte', label:'Projekte'},
  {id:'kontobewegungen', label:'Kontobewegungen'},
  {id:'kontenuebersicht', label:'Kontenübersicht'},
  {id:'verrechnung', label:'Verrechnung'},

function renderApp(){
  const p = document.getElementById('page');
  p.innerHTML = `
    <header class="top">
      <div class="wordmark">
        <div class="wordmark-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18"/><path d="M7 15h4"/></svg></div>

      </div>

      </div>

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t=>`<button class="${activeTab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
}
function switchTab(id){
  activeTab = id;
  editingEntryId = null;
  renderTabs();
  renderContent();
}

function renderContent(){
  const c = document.getElementById('content');
  if(activeTab==='dashboard') c.innerHTML = renderDashboard();
  else if(activeTab==='projekte') c.innerHTML = renderProjekte();
  else if(activeTab==='kontobewegungen') c.innerHTML = renderKontobewegungen();
  else if(activeTab==='kontenuebersicht') c.innerHTML = renderKontenuebersicht();
  else if(activeTab==='verrechnung') c.innerHTML = renderVerrechnung();
  bindEvents();
}

function renderDashboard(){
  const projects = Object.values(state.projectsById);
  const totalEinnahmen = projects.reduce((s,p)=>s+pEinnahmen(p),0) + vkEinnahmenAll();
  const totalAusgaben = projects.reduce((s,p)=>s+pAusgaben(p),0) + vkAusgabenAll();
  const diff = totalEinnahmen-totalAusgaben;
  const rows = projects.map(p=>`
    <tr><td>${esc(p.name)}</td>
      <td class="num pos">${eur(pEinnahmen(p))}</td>
      <td class="num neg">${eur(pAusgaben(p))}</td>
      <td class="num ${pDifferenz(p)>=0?'pos':'neg'}">${eur(pDifferenz(p))}</td></tr>`).join('');
  const konten = ACCOUNTS.map(a=>{
    const k = kontoStand(a);
    return `<div class="kpi"><div class="label">${accLabel(a)}</div><div class="value ${k.endbestand>=0?'pos':'neg'}">${eur(k.endbestand)}</div></div>`;
  }).join('');
  return `
    <div class="grid cols-3" style="margin-bottom:16px;">
      <div class="kpi"><div class="label">Einnahmen gesamt</div><div class="value pos">${eur(totalEinnahmen)}</div></div>
      <div class="kpi"><div class="label">Ausgaben gesamt</div><div class="value neg">${eur(totalAusgaben)}</div></div>
      <div class="kpi"><div class="label">Jahresergebnis</div><div class="value ${diff>=0?'pos':'neg'}">${eur(diff)}</div></div>
    </div>
    <div class="card">
      <h2>Projekte im Überblick</h2>
      ${projects.length? `<table><thead><tr><th>Projekt</th><th>Einnahmen</th><th>Ausgaben</th><th>Differenz</th></tr></thead>
      <tbody>${rows}
      <tr class="total"><td>Kontobewegungen (Miete, Fixkosten, Barbewegungen etc.)</td>
        <td class="num pos">${eur(vkEinnahmenAll())}</td><td class="num neg">${eur(vkAusgabenAll())}</td>
        <td class="num ${vkEinnahmenAll()-vkAusgabenAll()>=0?'pos':'neg'}">${eur(vkEinnahmenAll()-vkAusgabenAll())}</td></tr>
      </tbody></table>` : `<div class="empty">Noch keine Projekte angelegt. Los geht's im Tab „Projekte".</div>`}
    </div>
    <div class="card">
      <h2>Liquidität</h2>
      <div class="grid cols-3">${konten}</div>
      <div class="hint">Endbestand = Anfangsbestand + Zugänge − Abgänge. Details im Tab „Kontenübersicht".</div>
    </div>`;
}

function renderKontenuebersicht(){
  const rows = ACCOUNTS.map(a=>{
    const k = kontoStand(a);
    const diff = k.tatsaechlich - k.endbestand;
    return `<tr><td>${accLabel(a)}</td>
      <td><input type="number" step="0.01" class="num-in" data-konto-anfang="${a}" value="${k.anfang}" style="width:105px;"></td>
      <td class="num pos">${eur(k.zugang)}</td><td class="num neg">${eur(k.abgang)}</td>
      <td class="num ${k.endbestand>=0?'pos':'neg'}">${eur(k.endbestand)}</td>
      <td><input type="number" step="0.01" class="num-in" data-konto-tat="${a}" value="${k.tatsaechlich}" style="width:105px;"></td>
      <td class="num ${Math.abs(diff)<0.005?'pos':'neg'}">${eur(diff)}</td></tr>`;
  }).join('');
  return `
    <div class="card">
      <h2>Kontenübersicht / Liquidität</h2>
      <table><thead><tr><th>Konto</th><th>Anfangsbestand</th><th>Zugänge</th><th>Abgänge</th><th>Endbestand</th><th>Tatsächl. Kontostand</th><th>Differenz</th></tr></thead>

      <div class="hint">Anfangsbestand und tatsächlicher Kontostand trägst du manuell ein. Zugänge/Abgänge berechnen sich automatisch.</div>
    </div>`;
}

function renderVerrechnung(){
  const rows = state.members.map(m=>{
    const t = memberTotals(m);
    return `<tr><td>${esc(m)}</td><td class="num">${eur(t.gesamt)}</td><td class="num ${t.offen>0?'neg':''}">${eur(t.offen)}</td><td class="num pos">${eur(t.erstattet)}</td></tr>`;
  }).join('');
  const totalOffen = state.members.reduce((s,m)=>s+memberTotals(m).offen,0);
  return `
    <div class="card">
      <h2>Verrechnung Mitglieder (Auslagen)</h2>
      <div class="hint">„Erstattet" wird pro Buchung im jeweiligen Projekt-Tab abgehakt.</div>
      <table><thead><tr><th>Mitglied</th><th>Ausgelegt gesamt</th><th>davon offen</th><th>davon erstattet</th></tr></thead>
      <tbody>${rows}<tr class="total"><td>Gesamt offen</td><td></td><td class="num neg">${eur(totalOffen)}</td><td></td></tr></tbody></table>
    </div>`;
}

// ---------- Events ----------
function bindEvents(){
  document.querySelectorAll('[data-pid]').forEach(el=>el.onclick=()=>{ activeProjectId = el.dataset.pid; editingEntryId = null; renderContent(); });

  const newProjBtn = document.getElementById('new-proj-add');
  if(newProjBtn) newProjBtn.onclick = async ()=>{
    const name = document.getElementById('new-proj-name').value.trim();
    const kuerzel = document.getElementById('new-proj-kuerzel').value.trim().toUpperCase();
    const traeger = document.getElementById('new-proj-traeger').value.trim();
    const budget = num(document.getElementById('new-proj-budget').value);
    const einnahmenBar = num(document.getElementById('new-proj-bar').value);
    const einnahmenShop = num(document.getElementById('new-proj-shop').value);
    if(!name || !kuerzel || !traeger){ showToast('Titel, Kürzel und Projektträger sind Pflichtfelder'); return; }
    await withBusy('Speichert…', async ()=>{
      await appendRow('Projekte', {id:uid(), name, kuerzel, traeger, budget, einnahmenBar, einnahmenShop});
      await refresh();
    });
    renderContent();
  };
  const saveMetaBtn = document.getElementById('p-save-meta');
  if(saveMetaBtn) saveMetaBtn.onclick = async ()=>{
    const p = state.projectsById[activeProjectId];
    const updated = {
      id: p.id,
      name: document.getElementById('p-name').value.trim(),
      kuerzel: document.getElementById('p-kuerzel').value.trim().toUpperCase() || 'ALLG',
      traeger: document.getElementById('p-traeger').value.trim(),
      budget: p.budget || 0,
      einnahmenBar: p.einnahmenBar || 0,
      einnahmenShop: p.einnahmenShop || 0,
    };
    await withBusy('Speichert…', async ()=>{ await updateRow('Projekte', p.__row, updated); await refresh(); });
    renderContent(); showToast('Gespeichert');
  };
  const delProjBtn = document.getElementById('p-delete');
  if(delProjBtn) delProjBtn.onclick = async ()=>{
    if(!confirm('Projekt wirklich löschen?')) return;
    const p = state.projectsById[activeProjectId];
    const entryRows = (p.entries||[]).map(e=>e.__row);
    const entryIds = (p.entries||[]).map(e=>e.id);
    const linkedVk = state.vereinskonto.filter(v=>entryIds.includes(v.quelleBuchungId));
    await withBusy('Löscht…', async ()=>{
      const belegUrls = [...(p.entries||[]).map(e=>e.belegUrl), ...linkedVk.map(v=>v.belegUrl)].filter(Boolean);
      await Promise.all(belegUrls.map(u=>trashDriveFile(u)));
      await deleteRows('Buchungen', entryRows);
      await deleteRows('Vereinskonto', linkedVk.map(v=>v.__row));
      await deleteRows('Projekte', [p.__row]);
      await refresh();
    });
    activeProjectId = null;
    editingEntryId = null;
    renderContent();
  };
  const addEntryBtn = document.getElementById('e-add');
  if(addEntryBtn) addEntryBtn.onclick = async ()=>{
    const bezahltVon = document.getElementById('e-bezahltvon').value;
    const preis = num(document.getElementById('e-preis').value);
    const ausgabe = document.getElementById('e-ausgabe').value.trim();
    if(!ausgabe || !preis){ showToast('Bitte Ausgabe und Preis angeben'); return; }
    const datum = document.getElementById('e-datum').value || new Date().toISOString().slice(0,10);
    const kategorie = document.getElementById('e-kategorie').value;
    const zahlweg = bezahltVon==='ausgeglichen' ? document.getElementById('e-zahlweg').value : '';
    const file = document.getElementById('e-beleg').files[0];
    const p = state.projectsById[activeProjectId];
    const editing = editingEntryId ? (p.entries||[]).find(e=>e.id===editingEntryId) : null;

    await withBusy(file ? 'Lädt Beleg hoch…' : 'Speichert…', async ()=>{
      let belegnr = editing ? editing.belegnr : nextBelegnummer();
      let belegUrl = editing ? editing.belegUrl : '';
      if(file){
        if(editing && editing.belegUrl) await trashDriveFile(editing.belegUrl);
        if(!belegnr) belegnr = nextBelegnummer();
        const folderId = await resolveBelegFolder('Ausgabe', datum);
        const ext = (file.name.split('.').pop() || 'pdf');
        const filename = `${datum}_${belegnr}_${p.kuerzel||'ALLG'}_${sanitizeFilenamePart(ausgabe)}.${ext}`;
        const uploaded = await uploadBeleg(file, folderId, filename);
        belegUrl = uploaded.webViewLink || '';
      }
      if(editing){
        const updated = Object.assign({}, editing, { datum, ausgabe, preis, kategorie, bezahltVon, zahlweg, belegnr, belegUrl });
        await updateRow('Buchungen', editing.__row, updated);
        editingEntryId = null;
      } else {
        const entry = { id: uid(), projektId: activeProjectId, datum, ausgabe, preis, kategorie, bezahltVon, zahlweg, belegnr, erstattet:false, erstattetVia:'', belegUrl };
        await appendRow('Buchungen', entry);
      }
      await refresh();
    });
    renderContent();
  };
  const cancelEditBtn = document.getElementById('e-cancel');
  if(cancelEditBtn) cancelEditBtn.onclick = ()=>{ editingEntryId = null; renderContent(); };
  document.querySelectorAll('[data-edit-entry]').forEach(el=>el.onclick=()=>{ editingEntryId = el.dataset.editEntry; renderContent(); });
  document.querySelectorAll('[data-del-entry]').forEach(el=>el.onclick=async()=>{
    const p = state.projectsById[activeProjectId];
    const entry = (p.entries||[]).find(e=>e.id===el.dataset.delEntry);
    const linked = state.vereinskonto.find(v=>v.quelleBuchungId===entry.id);
    await withBusy('Löscht…', async ()=>{
      if(entry.belegUrl) await trashDriveFile(entry.belegUrl);
      if(linked && linked.belegUrl) await trashDriveFile(linked.belegUrl);
      await deleteRows('Buchungen', [entry.__row]);
      if(linked) await deleteRows('Vereinskonto', [linked.__row]);
      await refresh();
    });
    if(editingEntryId === entry.id) editingEntryId = null;
    renderContent();
  });
  document.querySelectorAll('[data-entry-erstattet]').forEach(el=>el.onchange=async()=>{
    const p = state.projectsById[activeProjectId];
    const entry = (p.entries||[]).find(e=>e.id===el.dataset.entryErstattet);
    const konto = el.value;
    const linked = state.vereinskonto.find(v=>v.quelleBuchungId===entry.id);
    await withBusy('Speichert…', async ()=>{
      if(konto){
        const vkEntry = {
          id: linked ? linked.id : uid(),
          datum: new Date().toISOString().slice(0,10),
          konto,
          kategorie: 'Erstattung',
          beschreibung: `Erstattung an ${entry.bezahltVon} – ${p.name} (${entry.ausgabe})`,
          betrag: entry.preis,
          typ: 'Ausgabe',
          quelleBuchungId: entry.id,
        };
        if(linked){ await updateRow('Vereinskonto', linked.__row, vkEntry); }
        else { await appendRow('Vereinskonto', vkEntry); }
      } else if(linked){
        await deleteRows('Vereinskonto', [linked.__row]);
      }
      const updated = Object.assign({}, entry, { erstattet: !!konto, erstattetVia: konto });
      await updateRow('Buchungen', entry.__row, updated);
      await refresh();
    });
    renderContent();
  });

  const vkAdd = document.getElementById('vk-add');
  if(vkAdd) vkAdd.onclick = async ()=>{
    const beschreibung = document.getElementById('vk-beschreibung').value.trim();
    const betrag = num(document.getElementById('vk-betrag').value);
    if(!beschreibung || !betrag){ showToast('Bitte Beschreibung und Betrag angeben'); return; }
    const datum = document.getElementById('vk-datum').value || new Date().toISOString().slice(0,10);
    const typ = document.getElementById('vk-typ').value;
    const file = document.getElementById('vk-beleg').files[0];
    await withBusy(file ? 'Lädt Beleg hoch…' : 'Speichert…', async ()=>{
      const belegnr = nextBelegnummer();
      let belegUrl = '';
      if(file){
        const folderId = await resolveBelegFolder(typ, datum);
        const ext = (file.name.split('.').pop() || 'pdf');
        const filename = `${datum}_${belegnr}_ALLG_${sanitizeFilenamePart(beschreibung)}.${ext}`;
        const uploaded = await uploadBeleg(file, folderId, filename);
        belegUrl = uploaded.webViewLink || '';
      }
      const entry = {
        id: uid(), datum,
        konto: document.getElementById('vk-konto').value,
        kategorie: document.getElementById('vk-kategorie').value.trim(),
        beschreibung, betrag, typ, belegnr, belegUrl, quelleBuchungId:'',
      };
      await appendRow('Vereinskonto', entry);
      await refresh();
    });
    renderContent();
  };
  document.querySelectorAll('[data-del-vk]').forEach(el=>el.onclick=async()=>{
    const entry = state.vereinskonto.find(e=>e.id===el.dataset.delVk);
    await withBusy('Löscht…', async ()=>{
      if(entry.belegUrl) await trashDriveFile(entry.belegUrl);
      await deleteRows('Vereinskonto', [entry.__row]);
      if(entry.quelleBuchungId){
        for(const proj of Object.values(state.projectsById)){
          const src = (proj.entries||[]).find(e=>e.id===entry.quelleBuchungId);
          if(src){ await updateRow('Buchungen', src.__row, Object.assign({}, src, { erstattet:false, erstattetVia:'' })); break; }
        }
      }
      await refresh();
    });
    renderContent();
  });

  const kontoSaveBtn = document.getElementById('konto-save');
  if(kontoSaveBtn) kontoSaveBtn.onclick = async ()=>{
    await withBusy('Speichert…', async ()=>{
      for(const a of ACCOUNTS){
        const row = kontoRow(a);
        const anfang = num(document.querySelector(`[data-konto-anfang="${a}"]`).value);
        const tatsaechlich = num(document.querySelector(`[data-konto-tat="${a}"]`).value);
        await updateRow('Konten', row.__row, { konto:a, anfang, tatsaechlich });
      }
      await refresh();
    });
    renderContent(); showToast('Gespeichert');
  };

  const addMemberBtn = document.getElementById('add-member');
  if(addMemberBtn) addMemberBtn.onclick = async ()=>{
    const val = document.getElementById('new-member-name').value.trim();
    if(!val) return;
    const names = [...state.members, val];
    await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
    renderContent();
  };
  document.querySelectorAll('[data-del-member]').forEach(el=>el.onclick=async()=>{
    const names = state.members.filter((_,i)=>i!==+el.dataset.delMember);
    await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
    renderContent();
  });
  const saveMembersBtn = document.getElementById('save-members');
  if(saveMembersBtn) saveMembersBtn.onclick = async ()=>{
    const names = state.members.map((_,i)=>document.querySelector(`[data-member-idx="${i}"]`).value.trim());
    await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
    renderContent(); showToast('Gespeichert');
  };
}

// ============ Setup- / Sign-in-Screens ============
function renderSetupForm(){
  const cfg = CONFIG || {};
  const canGoBack = !!(CONFIG && accessToken);
  const memberRows = canGoBack ? state.members.map((m,i)=>`
      <div class="member-edit">
        <input type="text" data-member-idx="${i}" value="${escAttr(m)}" style="min-width:180px;">
        <button class="btn danger small" data-del-member="${i}">×</button>
      </div>`).join('') : '';
  document.getElementById('page').innerHTML = `
    <div class="setup-card">
      <h2>Einstellungen</h2>
      <p>Verbindungsdaten werden nur lokal in diesem Browser gespeichert, nicht irgendwo hochgeladen.</p>
      <div class="field"><label>OAuth Client-ID (aus Google Cloud Console)</label><input type="text" id="cfg-client" value="${escAttr(cfg.clientId||'')}" placeholder="123456789-abc...apps.googleusercontent.com"></div>
      <div class="field"><label>Google Sheet ID (aus der Sheets-URL)</label><input type="text" id="cfg-sheet" value="${escAttr(cfg.spreadsheetId||'')}" placeholder="1AbCdEfGhIjKlMnOpQrStUvWxYz..."></div>
      <div class="field"><label>Finanzen-Ordner-ID in Drive (für Belege)</label><input type="text" id="cfg-folder" value="${escAttr(cfg.financeFolderId||'')}" placeholder="1XyZ... (aus der Drive-Ordner-URL)"></div>
      <div class="row-form">
        <button class="btn" id="cfg-save">Speichern & verbinden</button>
        ${canGoBack ? '<button class="btn ghost" id="cfg-back">Zurück, ohne zu speichern</button>' : ''}
      </div>
      ${canGoBack ? `
        <h3 style="margin-top:26px;">Mitglieder</h3>
        <div class="hint">Namen anpassen. Bereits gebuchte Einträge behalten den alten Namen als Text.</div>
        ${memberRows}
        <div class="row-form">
          <div class="field"><label>Neues Mitglied</label><input type="text" id="new-member-name" style="min-width:180px;"></div>
          <button class="btn ghost" id="add-member">+ Hinzufügen</button>
        </div>
        <div class="row-form"><button class="btn ghost" id="save-members">Namen speichern</button></div>
      ` : ''}
    </div>`;
  document.getElementById('cfg-save').onclick = ()=>{
    const clientId = document.getElementById('cfg-client').value.trim();
    const spreadsheetId = document.getElementById('cfg-sheet').value.trim();
    const financeFolderId = document.getElementById('cfg-folder').value.trim();
    if(!clientId || !spreadsheetId){ showToast('Bitte Client-ID und Sheet-ID ausfüllen'); return; }
    const changed = !CONFIG || CONFIG.clientId !== clientId;
    CONFIG = { clientId, spreadsheetId, financeFolderId };
    localStorage.setItem('karat_config', JSON.stringify(CONFIG));
    if(changed || !tokenClient) initGis();
    if(accessToken){ boot(); } else { renderSetupOrSignIn(); }
  };
  const backBtn = document.getElementById('cfg-back');
  if(backBtn) backBtn.onclick = ()=> renderApp();
  if(canGoBack){
    const addMemberBtn = document.getElementById('add-member');
    if(addMemberBtn) addMemberBtn.onclick = async ()=>{
      const val = document.getElementById('new-member-name').value.trim();
      if(!val) return;
      const names = [...state.members, val];
      await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
      renderSetupForm();
    };
    document.querySelectorAll('[data-del-member]').forEach(el=>el.onclick=async()=>{
      const names = state.members.filter((_,i)=>i!==+el.dataset.delMember);
      await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
      renderSetupForm();
    });
    const saveMembersBtn = document.getElementById('save-members');
    if(saveMembersBtn) saveMembersBtn.onclick = async ()=>{
      const names = state.members.map((_,i)=>document.querySelector(`[data-member-idx="${i}"]`).value.trim());
      await withBusy('Speichert…', async ()=>{ await clearAndWrite('Mitglieder', names.map(n=>[n])); await refresh(); });
      renderSetupForm(); showToast('Gespeichert');
    };
  }
}

function renderSignIn(){
  document.getElementById('page').innerHTML = `
    <div class="setup-card">
      <h2>Anmelden</h2>
      <p>Meldet dich mit deinem Google-Konto an, damit die App auf das gemeinsame Sheet zugreifen kann.</p>
      <button class="gsi-btn" id="signin-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.4 13 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.6c-.5 3-2.2 5.5-4.6 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.5 19.3c-.5 1.4-.8 3-.8 4.7s.3 3.3.8 4.7l-7.9 6.1C1 31.4 0 27.8 0 24s1-7.4 2.6-10.8l7.9 6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.8-2.1 15.7-5.8l-7.4-5.7c-2.1 1.4-4.8 2.2-8.3 2.2-6.3 0-11.6-3.5-13.5-9.6l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
        Mit Google anmelden
      </button>
      <p style="margin-top:14px;"><a href="#" id="reset-config" style="color:var(--text-tertiary); font-size:12px;">Einrichtung zurücksetzen</a></p>
    </div>`;
  document.getElementById('signin-btn').onclick = ()=> signIn(false);
  document.getElementById('reset-config').onclick = (e)=>{ e.preventDefault(); localStorage.removeItem('karat_config'); CONFIG=null; renderSetupOrSignIn(); };
}

function renderSetupOrSignIn(){
  if(!CONFIG){ renderSetupForm(); return; }
  if(!tokenClient) initGis();
  if(!accessToken){ renderSignIn(); return; }
  renderApp();
}

async function boot(){
  document.getElementById('page').innerHTML = '<div class="loading">Lade Daten…</div>';
  try{
    await ensureSheets();
    await refresh();
    renderApp();
  } catch(err){
    console.error(err);
    document.getElementById('page').innerHTML = `<div class="setup-card"><h2>Fehler beim Laden</h2><p>${esc(err.message||err)}</p><button class="btn" onclick="location.reload()">Neu laden</button></div>`;
  }
}

renderSetupOrSignIn();
</script>
</body>
</html>
